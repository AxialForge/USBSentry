name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Build the exe
        run: >
          python -m PyInstaller --noconsole --onefile --name "USBSentry"
          --icon "assets/USBSentry.ico" --add-data "assets;assets" --clean usbwatch.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: USBSentry-exe
          path: dist/USBSentry.exe

      - name: Attach exe to the release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/USBSentry.exe
